<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>系统登录</title>
    <style>
        body {
            margin: 0;
            font-family: "Microsoft YaHei", Arial, sans-serif;
            background: #0f172a;
            color: #e5e7eb;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            width: 380px;
            background: #111827;
            padding: 32px;
            border-radius: 14px;
            box-shadow: 0 0 25px rgba(0,0,0,0.5);
        }

        h1 {
            text-align: center;
            color: #60a5fa;
        }

        input {
            width: 100%;
            box-sizing: border-box;
            padding: 12px;
            margin-top: 14px;
            border-radius: 8px;
            border: 1px solid #374151;
            background: #020617;
            color: white;
            font-size: 16px;
        }

        button {
            width: 100%;
            margin-top: 18px;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #2563eb;
            color: white;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
        }

        a {
            color: #93c5fd;
            text-decoration: none;
        }

        .error {
            margin-top: 12px;
            color: #ef4444;
            text-align: center;
        }

        .bottom {
            margin-top: 18px;
            text-align: center;
            color: #9ca3af;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>校园共享单车检测系统</h1>

        <form method="post" action="/login">
            <input type="text" name="username" placeholder="用户名">
            <input type="password" name="password" placeholder="密码">
            <button type="submit">登录</button>
        </form>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <div class="bottom">
            没有账号？<a href="/register">注册用户</a>
        </div>
    </div>
</body>
</html>
